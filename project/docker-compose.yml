# docker-compose.yml — V2V IDS Federated Learning System
# =========================================================
#
# Services:
#   redis      — message broker for BSM broadcast + mode alerts
#   vehicle    — benign vehicles  (scale via --scale vehicle=10)
#   attacker   — adversarial vehicle (1 instance)
#   fl_server  — Flower FL server: Krum aggregation + FedProx config
#
# Usage:
#   # Week 1 - single vehicle + redis (no FL)
#   docker compose up redis vehicle --scale vehicle=1 --build
#
#   # Week 2 - full 10+1 fleet (no FL server yet)
#   docker compose up redis vehicle attacker --scale vehicle=10 --build
#
#   # Integration test - full system including FL server
#   docker compose up --build
#
# To rebuild after code changes:
#   docker compose build && docker compose up

version: "3.9"

networks:
  v2v_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Shared vehicle build context
x-vehicle-build: &vehicle-build
  context: .
  dockerfile: Dockerfile

# Shared vehicle environment
x-vehicle-env: &vehicle-env
  REDIS_HOST:              redis
  REDIS_PORT:              "6379"
  FL_SERVER_HOST:          fl_server
  FL_SERVER_PORT:          "8080"
  MODEL_DIR:               /app/model
  TRAIN_SAMPLE_THRESHOLD:  "500"
  TRAIN_TIME_INTERVAL_S:   "60"
  GENERATION_INTERVAL_S:   "0.5"
  PYTHONUNBUFFERED:        "1"
  TF_CPP_MIN_LOG_LEVEL:    "3"

services:

  # Redis - message broker
  redis:
    image: redis:7-alpine
    container_name: v2v_redis
    networks:
      - v2v_net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # FL Server - starts before vehicles so clients can connect immediately
  # Waits for MIN_FIT_CLIENTS (10) before beginning each round
  fl_server:
    build:
      context: .
      dockerfile: fl_server/Dockerfile
    container_name: v2v_fl_server
    environment:
      NUM_ROUNDS:           "10"
      MIN_FIT_CLIENTS:      "10"
      MIN_AVAIL_CLIENTS:    "10"
      MIN_EVAL_CLIENTS:     "5"
      KRUM_F:               "1"
      PROXIMAL_MU:          "0.01"
      LOCAL_EPOCHS:         "3"
      BATCH_SIZE:           "256"
      FL_SERVER_PORT:       "8080"
      MODEL_DIR:            "/app/model"
      MU_SCHEDULE:          "flat"
      PYTHONUNBUFFERED:     "1"
      TF_CPP_MIN_LOG_LEVEL: "3"
    networks:
      - v2v_net
    ports:
      - "8080:8080"
    restart: unless-stopped

  # Benign Vehicles - scale with: docker compose up --scale vehicle=10
  # VEHICLE_ID derived at runtime from hostname (see entrypoint.sh)
  vehicle:
    build: *vehicle-build
    environment:
      <<: *vehicle-env
      ROLE: benign
    networks:
      - v2v_net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 10
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # Attacker Vehicle
  attacker:
    build: *vehicle-build
    container_name: v2v_attacker
    environment:
      <<: *vehicle-env
      VEHICLE_ID:           "attacker_01"
      ROLE:                 attacker
      ATTACKER_INTERVAL_S:  "0.1"
    networks:
      - v2v_net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
